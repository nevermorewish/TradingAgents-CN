# ============================================================================
# 宝塔面板 nginx (openresty) 站点配置 —— TradingAgents-CN
# ============================================================================
#
# 部署位置：服务器 /www/server/panel/vhost/nginx/<your-domain>.conf
#
# 前置条件：
#   1. docker compose up -d 已启动，容器端口仅绑定 127.0.0.1：
#        backend  -> 127.0.0.1:8000
#        frontend -> 127.0.0.1:8081
#   2. 宝塔已为该域名签发 SSL 证书（路径见下方 ssl_certificate）
#   3. 主 nginx.conf 里 http {} 块包含
#        map $http_upgrade $connection_upgrade { default upgrade; '' close; }
#      （宝塔默认 0.websocket.conf 已提供）
#
# 应用方式：
#   - 在宝塔「网站 -> 设置 -> 反向代理」里粘贴本文的 PROXY 段，或
#   - 直接覆盖到 /www/server/panel/vhost/nginx/<your-domain>.conf 后
#     执行 `nginx -t && nginx -s reload`
#
# 校验：
#   curl -I  https://<your-domain>/
#   curl -sS https://<your-domain>/api/health
# ============================================================================

proxy_cache_path /www/wwwroot/<your-domain>/proxy_cache_dir
                 levels=1:2
                 keys_zone=frogclaw_xyz_cache:20m
                 inactive=1d
                 max_size=5g;

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    listen [::]:80;
    server_name <your-domain>;
    index index.html;
    root /www/wwwroot/<your-domain>;

    # ---- 宝塔扩展（按需保留） ----
    include /www/server/panel/vhost/nginx/extension/<your-domain>/*.conf;
    include /www/server/panel/vhost/nginx/well-known/<your-domain>.conf;

    # ---- SSL（由宝塔签发后填入） ----
    ssl_certificate     /www/server/panel/vhost/cert/<your-domain>/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/<your-domain>/privkey.pem;
    ssl_protocols       TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers         EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    # ---- WebSocket 全局（依赖宝塔 0.websocket.conf 提供 $connection_upgrade） ----
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;

    # =========================================================================
    # 反向代理：/api/ -> 后端 FastAPI；/ -> 前端 Vue 静态站
    # =========================================================================
    #PROXY-CONF-START
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 禁用缓存（API 必须实时）
        proxy_buffering on;
        proxy_cache off;

        # 长连接超时（适配 SSE / WebSocket / 长轮询）
        proxy_connect_timeout 120s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;

        # 缓冲（与全局 proxy_temp_file_write_size 协调）
        proxy_buffer_size           128k;
        proxy_buffers               4 256k;
        proxy_busy_buffers_size     256k;
        proxy_temp_file_write_size  512k;
    }

    location ^~ / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    #PROXY-CONF-END

    # =========================================================================
    # 安全：禁止访问敏感文件 / 目录
    # =========================================================================
    location ~* (\.user\.ini|\.htaccess|\.htpasswd|\.env.*|\.git|\.svn|\.idea|\.vscode|
                 docker-compose\.ya?ml|Dockerfile|composer\.(json|lock)|
                 package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|
                 requirements\.txt|pyproject\.toml|go\.(mod|sum)|Cargo\.(toml|lock)|
                 \.bak(up)?|\.old|\.tmp|\.swp|\.swo|\.log|\.sql(\.gz)?)$ {
        return 404;
    }

    location ~* /(\.git|\.svn|\.vscode|\.idea|\.ssh|\.github|\.cache|node_modules)/ {
        return 404;
    }

    # ACME challenge（Let's Encrypt 续签）
    location /.well-known {
        allow all;
    }

    access_log /www/wwwlogs/<your-domain>.log;
    error_log  /www/wwwlogs/<your-domain>.error.log;
}
